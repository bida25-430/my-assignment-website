<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cart</title>
        <link rel="stylesheet" href="style.css">
</head>
<body>

    <!--Header Selection -->
    <header class="header">
        <div class="logo-and-links">
            <div class="spacer-left"></div> 
            <h1 class="logo">COOL DRIPS</h1>
            <div class="header-action-links">
                <a href="help.html" class="action-link">Help</a>
                <a href="sign-in.html" class="action-link">Sign-in</a>
            </div>
        </div>
            <div class="header-action-links-right">
              <input type="text" placeholder="Search..">
              <a href="cart.html">Cart</a>
            </div>  
        </div>
    </header>

    <!-- navigation -->
    <nav>
      <div class="topnav">
        <a href="index.html">Home</a>
        <a href="men.html">Men</a>
        <a href="women.html">Women</a>
        <a href="inspo.html">Outfit Inspiration</a>
       </div>
    </nav>

    <!--Main Content-->
   <main class="cart-page">

        <section class="cart-container">
            <h1>Your Cart</h1>

            <div id="cart-items"></div>
        </section>

            <aside class="summary-box">
            <h2>Order Summary</h2>

            <div class="summary-row">
                <span>Items Total</span>
                <span id="items-total">$0</span>
            </div>

            <div class="summary-row">
                <span>Shipping</span>
                <span id="shipping">$15</span>
            </div>

            <div class="summary-row total-row">
                <span>Total</span>
                <span id="grand-total">$0</span>
            </div>

            <a href="checkout.html">
                <button class="checkout-btn">
                Proceed to Checkout
            </button>
            </a>

    </main>

<script src="cart.js"></script>

    <footer>
        <p>&copy; 2026 COOL DRIPS. STAY DRIPPY.</p>
    </footer>

</body>
</html>
