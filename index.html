<!DOCTYPE html>
<html lang="en"
<head>
    <meta charset=UTF-8>
    <meta name=viewport content=width=device-width, initial-scale=1.0>
    <title>COOL DRIPS | Latest Fashion</title>
    <style>
        /* Base Styles */
•	{ margin: 0; padding: 0; box-sizing: border-box; font-family: Helvetica, sans-serif; }
        Body { background-color: #fff; color: #1a1a1a; }

        /* Navigation */
        Nav {
            Display: flex;
            Justify-content: space-between;
            Align-items: center;
            Padding: 20px 5%;
            Border-bottom: 1px solid #eee;
            Position: sticky; top: 0; background: white; z-index: 100;
        }
        .logo { font-weight: 900; font-size: 1.5rem; letter-spacing: -1px; }
        .nav-links a { text-decoration: none; color: #1a1a1a; margin-left: 20px; font-size: 0.9rem; text-transform: uppercase; }

        /* Hero Section */
        .hero {
            Height: 40vh;
            Background: #f4f4f4; 
            Display: flex;
            Flex-direction: column;
            Justify-content: center;
            Align-items: center;
            Text-align: center;
            Background-image: url(‘https://images.unsplash.com/photo-1523381210434-271e8be1f52b?auto=format&fit=crop&w=1500&q=80’);
            Background-size: cover;
            Background-position: center;
            Color: white;
        }
        .hero h1 { font-size: 4rem; margin-bottom: 1rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
        .btn {
            Background: white; color: black; padding: 15px 40px;
            Text-decoration: none; font-weight: bold; text-transform: uppercase;
            Transition: 0.3s;
        }
        .btn:hover { background: #000; color: #fff; }

        /* Product Grid */
        .section-title { padding: 50px 5% 20px; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        .product-grid {
            Display: grid;
            Grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            Gap: 20px;
            Padding: 0 5% 50px;
        }
        .product-card { border: 1px solid #eee; padding-bottom: 15px; transition: transform 0.3s; }
        .product-card:hover { transform: translateY(-5px); }
        .product-img { width: 100%; height: 350px; background: #eee; object-fit: cover; }
        .product-info { padding: 15px; text-align: center; }
        .price { color: #888; margin-top: 5px; }

        /* Footer */
        Footer { background: #1a1a1a; color: white; padding: 50px 5%; text-align: center; }
    </style>
</head>
<body>

    <nav>
        <div class=logo>COOL DRIPS</div>
        <div class=nav-links>
            <a href=#>Shop</a>
            <a href=#>Drops</a>
            <a href=#>Cart (0)</a>
        </div>
    </nav>

    <header class=hero>
        <h1>THE NEW DRIP IS HERE</h1>
        <a href=#shop class=btn>Shop Collection</a>
    </header>

    <h2 class=section-title>New Arrivals</h2>
    <div class=product-grid id=shop>
        <div class=product-card>
            <img src=https://images.unsplash.com/photo-1554568218-0f1715e72254?auto=format&fit=crop&w=500&q=60 alt=Tee class=product-img>
            <div class=product-info>
                <p>Oversized Graphic Tee</p>
                <p class=price>$30.00</p>
            </div>
        </div>
        <div class=product-card>
            <img src=https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&w=500&q=60 alt=Hoodie class=product-img>
            <div class=product-info>
                <p>Essential Hoodie  Black</p>
                <p class=price>$40.00</p>
            </div>
        </div>
        <div class=product-card>
            <img src=https://images.unsplash.com/photo-1591195853828-11db59a44f6b?auto=format&fit=crop&w=500&q=60 alt=Shorts class=product-img>
            <div class=product-info>
                <p>Cargo Mesh Shorts</p>
                <p class=price>$25.00</p>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 COOL DRIPS. STAY DRIPPY.</p>
    </footer>

</body>
</html>
